# Test: log in with username + password, then verify we're logged in.
# This flow only *composes* reusable pieces — the actual steps live in subflows:
#   - launch:  flows/common/subflows/launch-app.yaml   (shared by all apps)
#   - login:   flows/naukri/subflows/login.yaml         (shared by naukri tests)
appId: ${APP_ID}
name: naukri-login-password
tags:
  - login
  - smoke
---
# 1. Launch the app fresh (common subflow).
- runFlow: ../../common/subflows/launch-app.yaml

# 2. Log in (naukri subflow). Credentials are threaded through explicitly.
- runFlow:
    file: ../subflows/login.yaml
    env:
      USERNAME: ${USERNAME}
      PASSWORD: ${PASSWORD}

# 3. Verify we're logged in. extendedWaitUntil waits up to 20s for the post-login
#    screen to settle. Replace "Jobs" with a stable post-login element
#    (home tab, profile name, search bar) confirmed via inspect.
- extendedWaitUntil:
    visible: "Jobs"
    timeout: 20000
- takeScreenshot: ${SCREENSHOT_DIR}/naukri_logged_in
